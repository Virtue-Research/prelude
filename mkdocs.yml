site_name: Prelude
site_description: Prelude Documentation — Fast LLM Inference Engine in Rust

# Documentation directory (where markdown files are)
docs_dir: docs/wiki

# Output directory (generated static site)
site_dir: site

# Repository information
repo_url: https://github.com/Virtue-Research/prelude
repo_name: prelude

# Theme
theme:
  name: material
  logo: assets/logos/prelude-logo.svg
  favicon: assets/logos/prelude-favicon.svg
  palette:
    - scheme: default
      primary: custom
      accent: custom
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - scheme: slate
      primary: custom
      accent: custom
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.top
    - search.suggest
    - search.highlight
    - content.code.copy
    - content.code.annotate

# Plugins
plugins:
  - search
  - minify:
      minify_html: true
  - autorefs

# Markdown extensions
markdown_extensions:
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.superfences
  - pymdownx.tabbed:
      alternate_style: true
  - admonition
  - pymdownx.details
  - attr_list
  - md_in_html
  - toc:
      permalink: true

# Custom styles
extra_css:
  - assets/stylesheets/extra.css

# Navigation structure
nav:
  - Home: index.md
  - User Guide:
    - Getting Started: user_guide/setup.md
    - Serving and Deployment: user_guide/serving.md
    - Configuration: user_guide/configuration.md
    - Supported Models: user_guide/supported-models.md
    - Features: user_guide/features.md
  - Developer Guide:
    - General: developer_guide/general.md
    - Adding components: developer_guide/add.md
    - Integration: developer_guide/integration.md
    - Design:
      - Overview: developer_guide/design/overview.md
      - Scheduler: developer_guide/design/scheduler.md
      - Models: developer_guide/design/models.md
      - Modules and Operators: developer_guide/design/ops.md 
      - Devices: developer_guide/design/devices.md
  - API Reference:
    - Overview: api/index.md
    - Endpoints: api/endpoints.md
  - CLI Reference: cli/index.md
  - Benchmarking:
    - Results: benchmarks/results.md
    - Running Benchmarks: benchmarks/running.md
  - Community:
    - Contributing: community/contributing.md

# Extra
extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/Virtue-Research/prelude
