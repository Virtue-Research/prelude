[package]
name = "prelude-core"
version.workspace = true
edition.workspace = true
license.workspace = true
rust-version.workspace = true
repository.workspace = true
homepage.workspace = true
documentation.workspace = true
description = "Core inference engine, scheduler, and model runtime for Prelude"
readme = "../../README.md"
keywords = ["llm", "inference", "serving", "scheduler", "rust"]

[features]
default = ["onednn"]
cuda = ["candle-core/cuda", "candle-nn/cuda", "candle-transformers/cuda"]
flash-attn = ["cuda", "paged-attn", "candle-flash-attn"]
flash-attn-v3 = ["cuda", "candle-flash-attn-v3"]
flash-attn-v4 = ["cuda", "prelude-flash-attn-v4"]
deepgemm = ["cuda", "prelude-deepgemm"]
flashinfer = ["cuda", "prelude-flashinfer"]
## FlashInfer + FA4 combined: FlashInfer skips tvm_ffi compilation (FA4 provides it).
flashinfer-v4 = ["flashinfer", "flash-attn-v4", "prelude-flashinfer/skip-tvm-ffi"]
paged-attn = ["dep:candle-paged-attn"]
onednn = []
ggml-quants = ["dep:prelude-ggml-quants"]
hf_tokenizer = ["dep:tokenizers"]

[dependencies]
async-trait.workspace = true
chrono.workspace = true
serde.workspace = true
serde_json.workspace = true
thiserror.workspace = true
tokio.workspace = true
tracing.workspace = true

candle-core.workspace = true
candle-nn.workspace = true
candle-transformers.workspace = true
fastokens.workspace = true
hf-hub.workspace = true
half = "2.7.1"
candle-flash-attn = { workspace = true, optional = true }
candle-flash-attn-v3 = { workspace = true, optional = true }
candle-paged-attn = { workspace = true, optional = true }
prelude-flash-attn-v4 = { workspace = true, optional = true }
prelude-deepgemm = { workspace = true, optional = true }
prelude-flashinfer = { workspace = true, optional = true }
prelude-ggml-quants = { path = "../prelude-ggml-quants", optional = true }
rayon = "1.11.0"
libc = "1.0.0-alpha.3"
tokenizers = { workspace = true, optional = true }
