task = "complete"

concurrency = [1, 4, 16, 32]
requests    = [50, 100, 200, 200]
warmup      = 5
max_tokens  = 128            # decode length
streaming   = true           # collect TTFT and TPOT
seed        = 42

# output = "results/complete_generation.json"

[data]
type    = "realworld"
dataset = "openai/gsm8k"     # must have "question" column; needs: pip install datasets
